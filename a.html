<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX 웹 시계</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        #clock {
            font-size: 5rem;
            font-weight: bold;
            letter-spacing: 5px;
        }
        .label {
            font-size: 1.2rem;
            color: #bdc3c7;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="label">🌍 오차 보정 웹 시계 (한국 시간)</div>
    <div id="clock">시간을 동기화하는 중...</div>

    <script>
        let timeOffset = 0;   // 서버와 내 기기의 시간 오차를 저장할 변수
        let isSynced = false; // 동기화 완료 여부 확인

        async function syncServerTime() {
            try {
                // 1. 처음 딱 한 번만 서버 시간을 가져옵니다.
                const response = await fetch('http://worldclockapi.com/api/json/utc/now');
                const data = await response.json();
                
                // 2. 서버 시간과 라즈베리 파이(내 기기) 시간의 밀리초(ms) 단위 차이를 계산합니다.
                const serverTimeMs = new Date(data.currentDateTime).getTime();
                const localTimeMs = new Date().getTime();
                
                timeOffset = serverTimeMs - localTimeMs;
                isSynced = true; // 동기화 완료!

            } catch (error) {
                console.error("시간 동기화 실패:", error);
                document.getElementById('clock').innerText = "통신 오류";
            }
        }

        function updateClock() {
            // 서버와 동기화가 끝났을 때만 시계를 움직입니다.
            if (isSynced) {
                // 핵심! 라즈베리 파이 시간에 '오차'를 더해서 항상 정확한 시간을 만들어냅니다.
                const realTimeMs = new Date().getTime() + timeOffset;
                const realTime = new Date(realTimeMs);

                // 한국 시간으로 보기 좋게 문자열 변환
                const timeString = realTime.toLocaleTimeString('ko-KR', { 
                    timeZone: 'Asia/Seoul',
                    hour12: false // 24시간제
                });

                document.getElementById('clock').innerText = timeString;
            }
        }

        // 1. 페이지가 열리면 즉시 서버와 시간 동기화를 시도합니다.
        syncServerTime();

        // 2. 서버 통신 없이, 내 기기에서 1초(1000ms)마다 시계 화면만 업데이트합니다.
        setInterval(updateClock, 1000);
        
        // (선택) 혹시 모를 누적 오차를 대비해 1시간(3600000ms)마다 한 번씩만 서버와 재동기화
        setInterval(syncServerTime, 3600000); 
    </script>

</body>
</html>
