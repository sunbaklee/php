<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX 웹 시계</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        #clock {
            font-size: 5rem;
            font-weight: bold;
            letter-spacing: 5px;
        }
        .label {
            font-size: 1.2rem;
            color: #bdc3c7;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="label">🌍 World Clock API 연동 (한국 시간)</div>
    <div id="clock">시간을 불러오는 중...</div>

    <script>
        async function fetchServerTime() {
            try {
                // 1. World Clock API에 세계 표준시(UTC)를 요청합니다.
                // (주의: 이 API는 https가 아닌 http로만 통신합니다)
                const response = await fetch('http://worldclockapi.com/api/json/utc/now');
                const data = await response.json();
                
                // 2. World Clock API는 시간을 'currentDateTime'이라는 이름으로 줍니다.
                // 데이터 예시: "2023-10-27T14:30Z" 
                const dateTimeString = data.currentDateTime;
                
                // 3. 받아온 UTC 표준시를 자바스크립트 Date 객체로 만듭니다.
                const dateObj = new Date(dateTimeString);
                
                // 4. 한국 시간(Asia/Seoul) 기준으로 보기 좋게 문자로 바꿉니다.
                const timeString = dateObj.toLocaleTimeString('ko-KR', { 
                    timeZone: 'Asia/Seoul',
                    hour12: false // 24시간제로 표시하려면 true를 false로 변경
                });

                document.getElementById('clock').innerText = timeString;

            } catch (error) {
                console.error("서버에서 시간을 가져오는데 실패했습니다.", error);
                document.getElementById('clock').innerText = "통신 오류";
            }
        }

        fetchServerTime();
        setInterval(fetchServerTime, 1000);
    </script>

</body>
</html>
